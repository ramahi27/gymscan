<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GymScan Exercise Illustrations</title>
  <style>
    body { background: #0A0A0A; font-family: system-ui, sans-serif; margin: 0; padding: 24px; }
    h1 { color: #fff; font-size: 13px; letter-spacing: 3px; font-weight: 800; margin-bottom: 24px; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }
    .card { background: #16162A; border-radius: 12px; overflow: hidden; border: 1px solid rgba(111,97,239,0.25); }
    .card svg { display: block; width: 100%; aspect-ratio: 1; }
    .label { color: rgba(255,255,255,0.6); font-size: 10px; letter-spacing: 1.5px; font-weight: 700;
             text-align: center; padding: 8px 4px; text-transform: uppercase; }
  </style>
</head>
<body>
<h1>GYMSCAN — EXERCISE ILLUSTRATIONS</h1>
<div class="grid">

  <!-- DUMBBELL -->
  <div class="card">
    <svg viewBox="0 0 100 100">
      <rect x="8"  y="33" width="14" height="34" rx="4" fill="#6F61EF"/>
      <rect x="22" y="43" width="7"  height="14" rx="2" fill="rgba(255,255,255,0.85)"/>
      <rect x="29" y="46" width="42" height="8"  rx="4" fill="rgba(255,255,255,0.85)"/>
      <rect x="71" y="43" width="7"  height="14" rx="2" fill="rgba(255,255,255,0.85)"/>
      <rect x="78" y="33" width="14" height="34" rx="4" fill="#6F61EF"/>
    </svg>
    <div class="label">Dumbbell</div>
  </div>

  <!-- BARBELL -->
  <div class="card">
    <svg viewBox="0 0 100 100">
      <rect x="3"  y="46" width="94" height="8" rx="4" fill="rgba(255,255,255,0.85)"/>
      <rect x="3"  y="28" width="14" height="44" rx="4" fill="#6F61EF"/>
      <rect x="18" y="36" width="9"  height="28" rx="3" fill="#39D2C0"/>
      <rect x="73" y="36" width="9"  height="28" rx="3" fill="#39D2C0"/>
      <rect x="83" y="28" width="14" height="44" rx="4" fill="#6F61EF"/>
    </svg>
    <div class="label">Barbell</div>
  </div>

  <!-- KETTLEBELL -->
  <div class="card">
    <svg viewBox="0 0 100 100">
      <path d="M 32 56 Q 30 22 50 22 Q 70 22 68 56 L 64 56 Q 65 28 50 28 Q 35 28 36 56 Z" fill="#6F61EF"/>
      <circle cx="50" cy="70" r="22" fill="#6F61EF"/>
      <circle cx="42" cy="60" r="6" fill="rgba(255,255,255,0.15)"/>
    </svg>
    <div class="label">Kettlebell</div>
  </div>

  <!-- CABLE MACHINE -->
  <div class="card">
    <svg viewBox="0 0 100 100">
      <rect x="18" y="22" width="18" height="58" rx="3" fill="#6F61EF"/>
      <line x1="18" y1="32" x2="36" y2="32" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
      <line x1="18" y1="42" x2="36" y2="42" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
      <line x1="18" y1="52" x2="36" y2="52" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
      <line x1="18" y1="62" x2="36" y2="62" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
      <rect x="42" y="12" width="8" height="76" rx="3" fill="rgba(255,255,255,0.3)"/>
      <rect x="28" y="12" width="34" height="9" rx="3" fill="rgba(255,255,255,0.3)"/>
      <rect x="28" y="83" width="34" height="8" rx="3" fill="rgba(255,255,255,0.3)"/>
      <circle cx="46" cy="18" r="6" fill="#39D2C0"/>
      <line x1="46" y1="24" x2="46" y2="72" stroke="#39D2C0" stroke-width="2"/>
      <rect x="40" y="72" width="12" height="6" rx="3" fill="#39D2C0"/>
    </svg>
    <div class="label">Cable Machine</div>
  </div>

  <!-- PULL-UP BAR -->
  <div class="card">
    <svg viewBox="0 0 100 100">
      <rect x="10" y="12" width="7" height="18" rx="2" fill="rgba(255,255,255,0.3)"/>
      <rect x="83" y="12" width="7" height="18" rx="2" fill="rgba(255,255,255,0.3)"/>
      <rect x="10" y="18" width="80" height="7" rx="3" fill="#6F61EF"/>
      <circle cx="50" cy="35" r="8" fill="#39D2C0"/>
      <line x1="50" y1="30" x2="35" y2="22" stroke="#39D2C0" stroke-width="4" stroke-linecap="round"/>
      <line x1="50" y1="30" x2="65" y2="22" stroke="#39D2C0" stroke-width="4" stroke-linecap="round"/>
      <line x1="50" y1="43" x2="50" y2="68" stroke="#39D2C0" stroke-width="4" stroke-linecap="round"/>
      <line x1="50" y1="68" x2="42" y2="84" stroke="#39D2C0" stroke-width="4" stroke-linecap="round"/>
      <line x1="50" y1="68" x2="58" y2="84" stroke="#39D2C0" stroke-width="4" stroke-linecap="round"/>
    </svg>
    <div class="label">Pull-Up</div>
  </div>

  <!-- TREADMILL -->
  <div class="card">
    <svg viewBox="0 0 100 100">
      <rect x="12" y="52" width="76" height="22" rx="8" fill="#6F61EF"/>
      <line x1="24" y1="63" x2="76" y2="63" stroke="rgba(0,0,0,0.25)" stroke-width="2"/>
      <line x1="24" y1="68" x2="76" y2="68" stroke="rgba(0,0,0,0.25)" stroke-width="2"/>
      <rect x="24" y="24" width="6" height="32" rx="3" fill="rgba(255,255,255,0.85)"/>
      <rect x="70" y="24" width="6" height="32" rx="3" fill="rgba(255,255,255,0.85)"/>
      <rect x="24" y="18" width="52" height="12" rx="4" fill="#39D2C0"/>
      <rect x="22" y="36" width="56" height="5" rx="2" fill="rgba(255,255,255,0.3)"/>
    </svg>
    <div class="label">Treadmill</div>
  </div>

  <!-- BIKE -->
  <div class="card">
    <svg viewBox="0 0 100 100">
      <circle cx="26" cy="66" r="18" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="4"/>
      <circle cx="26" cy="66" r="4"  fill="rgba(255,255,255,0.85)"/>
      <circle cx="74" cy="66" r="18" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="4"/>
      <circle cx="74" cy="66" r="4"  fill="rgba(255,255,255,0.85)"/>
      <line x1="26" y1="66" x2="50" y2="46" stroke="#6F61EF" stroke-width="4" stroke-linecap="round"/>
      <line x1="74" y1="66" x2="50" y2="46" stroke="#6F61EF" stroke-width="4" stroke-linecap="round"/>
      <line x1="50" y1="46" x2="50" y2="58" stroke="#6F61EF" stroke-width="4" stroke-linecap="round"/>
      <rect x="40" y="42" width="20" height="5" rx="2" fill="#39D2C0"/>
      <line x1="74" y1="66" x2="76" y2="44" stroke="#6F61EF" stroke-width="4" stroke-linecap="round"/>
      <line x1="68" y1="44" x2="84" y2="44" stroke="#39D2C0" stroke-width="4" stroke-linecap="round"/>
    </svg>
    <div class="label">Bike / Spin</div>
  </div>

  <!-- ROWING MACHINE -->
  <div class="card">
    <svg viewBox="0 0 100 100">
      <rect x="8"  y="58" width="84" height="7" rx="3" fill="rgba(255,255,255,0.3)"/>
      <rect x="60" y="52" width="22" height="14" rx="3" fill="#6F61EF"/>
      <rect x="28" y="52" width="18" height="8"  rx="3" fill="#39D2C0"/>
      <rect x="10" y="42" width="20" height="5"  rx="2" fill="rgba(255,255,255,0.85)"/>
      <line x1="30" y1="44" x2="46" y2="55" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
      <circle cx="46" cy="40" r="7" fill="#39D2C0"/>
      <line x1="46" y1="47" x2="46" y2="58" stroke="#39D2C0" stroke-width="4" stroke-linecap="round"/>
      <line x1="46" y1="50" x2="30" y2="44" stroke="#39D2C0" stroke-width="3" stroke-linecap="round"/>
    </svg>
    <div class="label">Rowing Machine</div>
  </div>

  <!-- BENCH -->
  <div class="card">
    <svg viewBox="0 0 100 100">
      <rect x="12" y="38" width="76" height="18" rx="6" fill="#6F61EF"/>
      <rect x="18" y="56" width="6"  height="26" rx="2" fill="rgba(255,255,255,0.3)"/>
      <rect x="18" y="78" width="18" height="5"  rx="2" fill="rgba(255,255,255,0.3)"/>
      <rect x="76" y="56" width="6"  height="26" rx="2" fill="rgba(255,255,255,0.3)"/>
      <rect x="64" y="78" width="18" height="5"  rx="2" fill="rgba(255,255,255,0.3)"/>
    </svg>
    <div class="label">Bench</div>
  </div>

  <!-- SQUAT RACK -->
  <div class="card">
    <svg viewBox="0 0 100 100">
      <rect x="12" y="18" width="7" height="68" rx="3" fill="rgba(255,255,255,0.3)"/>
      <rect x="81" y="18" width="7" height="68" rx="3" fill="rgba(255,255,255,0.3)"/>
      <rect x="12" y="36" width="12" height="5" rx="2" fill="#6F61EF"/>
      <rect x="76" y="36" width="12" height="5" rx="2" fill="#6F61EF"/>
      <rect x="12" y="31" width="76" height="6" rx="3" fill="rgba(255,255,255,0.85)"/>
      <rect x="4"  y="22" width="10" height="24" rx="3" fill="#6F61EF"/>
      <rect x="86" y="22" width="10" height="24" rx="3" fill="#6F61EF"/>
    </svg>
    <div class="label">Squat Rack</div>
  </div>

  <!-- SHOULDER PRESS -->
  <div class="card">
    <svg viewBox="0 0 100 100">
      <circle cx="50" cy="22" r="9" fill="#39D2C0"/>
      <line x1="50" y1="31" x2="50" y2="60" stroke="#39D2C0" stroke-width="4" stroke-linecap="round"/>
      <line x1="50" y1="38" x2="25" y2="22" stroke="#39D2C0" stroke-width="4" stroke-linecap="round"/>
      <line x1="50" y1="38" x2="75" y2="22" stroke="#39D2C0" stroke-width="4" stroke-linecap="round"/>
      <rect x="14" y="16" width="12" height="12" rx="3" fill="#6F61EF"/>
      <rect x="74" y="16" width="12" height="12" rx="3" fill="#6F61EF"/>
      <line x1="50" y1="60" x2="40" y2="82" stroke="#39D2C0" stroke-width="4" stroke-linecap="round"/>
      <line x1="50" y1="60" x2="60" y2="82" stroke="#39D2C0" stroke-width="4" stroke-linecap="round"/>
    </svg>
    <div class="label">Shoulder Press</div>
  </div>

  <!-- CHEST / BENCH PRESS -->
  <div class="card">
    <svg viewBox="0 0 100 100">
      <rect x="22" y="60" width="56" height="12" rx="4" fill="rgba(255,255,255,0.3)"/>
      <rect x="26" y="72" width="6"  height="16" rx="2" fill="rgba(255,255,255,0.3)"/>
      <rect x="68" y="72" width="6"  height="16" rx="2" fill="rgba(255,255,255,0.3)"/>
      <circle cx="50" cy="50" r="8"  fill="#39D2C0"/>
      <rect   x="44" y="58" width="12" height="18" rx="4" fill="#39D2C0"/>
      <rect x="12" y="46" width="76" height="5" rx="2" fill="rgba(255,255,255,0.85)"/>
      <rect x="8"  y="38" width="10" height="22" rx="3" fill="#6F61EF"/>
      <rect x="82" y="38" width="10" height="22" rx="3" fill="#6F61EF"/>
      <line x1="44" y1="60" x2="24" y2="48" stroke="#39D2C0" stroke-width="3" stroke-linecap="round"/>
      <line x1="56" y1="60" x2="76" y2="48" stroke="#39D2C0" stroke-width="3" stroke-linecap="round"/>
    </svg>
    <div class="label">Chest / Bench Press</div>
  </div>

  <!-- BICEP CURL -->
  <div class="card">
    <svg viewBox="0 0 100 100">
      <line x1="50" y1="20" x2="50" y2="50" stroke="#39D2C0" stroke-width="6" stroke-linecap="round"/>
      <line x1="50" y1="50" x2="32" y2="40" stroke="#39D2C0" stroke-width="6" stroke-linecap="round"/>
      <circle cx="50" cy="20" r="8" fill="#39D2C0"/>
      <rect x="16" y="30" width="10" height="20" rx="3" fill="#6F61EF"/>
      <rect x="21" y="27" width="6"  height="6"  rx="2" fill="rgba(255,255,255,0.85)"/>
      <rect x="21" y="47" width="6"  height="6"  rx="2" fill="rgba(255,255,255,0.85)"/>
      <circle cx="50" cy="50" r="5" fill="#6F61EF"/>
      <line x1="50" y1="28" x2="62" y2="46" stroke="rgba(255,255,255,0.3)" stroke-width="3" stroke-linecap="round"/>
      <line x1="62" y1="46" x2="62" y2="80" stroke="rgba(255,255,255,0.3)" stroke-width="3" stroke-linecap="round"/>
    </svg>
    <div class="label">Bicep Curl</div>
  </div>

  <!-- TRICEP PUSHDOWN -->
  <div class="card">
    <svg viewBox="0 0 100 100">
      <circle cx="50" cy="14" r="6" fill="#6F61EF"/>
      <rect x="46" y="8" width="8" height="12" rx="2" fill="rgba(255,255,255,0.3)"/>
      <line x1="50" y1="20" x2="50" y2="46" stroke="#39D2C0" stroke-width="2"/>
      <rect x="40" y="46" width="20" height="6" rx="3" fill="#39D2C0"/>
      <line x1="50" y1="24" x2="42" y2="44" stroke="#39D2C0" stroke-width="5" stroke-linecap="round"/>
      <line x1="42" y1="44" x2="42" y2="76" stroke="#39D2C0" stroke-width="5" stroke-linecap="round"/>
      <circle cx="42" cy="44" r="5" fill="#6F61EF"/>
      <line x1="50" y1="24" x2="60" y2="50" stroke="rgba(255,255,255,0.3)" stroke-width="3" stroke-linecap="round"/>
      <line x1="60" y1="50" x2="60" y2="80" stroke="rgba(255,255,255,0.3)" stroke-width="3" stroke-linecap="round"/>
    </svg>
    <div class="label">Tricep Pushdown</div>
  </div>

  <!-- ABS / PLANK -->
  <div class="card">
    <svg viewBox="0 0 100 100">
      <rect x="10" y="72" width="80" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
      <circle cx="82" cy="58" r="8" fill="#39D2C0"/>
      <rect x="22" y="60" width="54" height="8" rx="4" fill="#39D2C0"/>
      <rect x="20" y="68" width="6" height="10" rx="2" fill="#39D2C0"/>
      <rect x="38" y="68" width="6" height="10" rx="2" fill="#39D2C0"/>
      <rect x="10" y="62" width="14" height="6" rx="3" fill="#39D2C0"/>
    </svg>
    <div class="label">Abs / Plank</div>
  </div>

  <!-- RESISTANCE BAND -->
  <div class="card">
    <svg viewBox="0 0 100 100">
      <rect x="8"  y="44" width="12" height="12" rx="4" fill="rgba(255,255,255,0.3)"/>
      <rect x="80" y="44" width="12" height="12" rx="4" fill="rgba(255,255,255,0.3)"/>
      <path d="M 20 50 Q 35 28 50 50 Q 65 72 80 50" fill="none" stroke="#39D2C0" stroke-width="5" stroke-linecap="round"/>
      <path d="M 20 50 Q 35 72 50 50 Q 65 28 80 50" fill="none" stroke="#6F61EF" stroke-width="5" stroke-linecap="round"/>
    </svg>
    <div class="label">Resistance Band</div>
  </div>

  <!-- MEDICINE BALL -->
  <div class="card">
    <svg viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="32" fill="#6F61EF"/>
      <path d="M 50 18 Q 68 34 68 50 Q 68 66 50 82 Q 32 66 32 50 Q 32 34 50 18 Z"
        fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
      <line x1="18" y1="50" x2="82" y2="50" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
      <circle cx="50" cy="50" r="10" fill="rgba(255,255,255,0.15)"/>
    </svg>
    <div class="label">Medicine Ball</div>
  </div>

  <!-- YOGA MAT -->
  <div class="card">
    <svg viewBox="0 0 100 100">
      <rect x="10" y="34" width="72" height="32" rx="6" fill="#6F61EF"/>
      <rect x="78" y="30" width="12" height="40" rx="6" fill="#39D2C0"/>
      <circle cx="84" cy="50" r="8" fill="#39D2C0"/>
      <line x1="22" y1="34" x2="22" y2="66" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
      <line x1="34" y1="34" x2="34" y2="66" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
      <line x1="46" y1="34" x2="46" y2="66" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
      <line x1="58" y1="34" x2="58" y2="66" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    </svg>
    <div class="label">Yoga Mat</div>
  </div>

  <!-- ELLIPTICAL -->
  <div class="card">
    <svg viewBox="0 0 100 100">
      <rect x="20" y="76" width="60" height="8" rx="3" fill="rgba(255,255,255,0.3)"/>
      <rect x="46" y="30" width="8"  height="48" rx="3" fill="rgba(255,255,255,0.3)"/>
      <path d="M 24 70 Q 22 45 50 38 Q 78 45 76 70 Q 78 82 50 76 Q 22 82 24 70 Z"
        fill="none" stroke="#6F61EF" stroke-width="3"/>
      <line x1="50" y1="30" x2="28" y2="58" stroke="#39D2C0" stroke-width="4" stroke-linecap="round"/>
      <line x1="50" y1="30" x2="72" y2="58" stroke="#39D2C0" stroke-width="4" stroke-linecap="round"/>
      <rect x="36" y="18" width="28" height="14" rx="4" fill="#6F61EF"/>
    </svg>
    <div class="label">Elliptical</div>
  </div>

  <!-- STAIR CLIMBER -->
  <div class="card">
    <svg viewBox="0 0 100 100">
      <rect x="10" y="68" width="52" height="8" rx="2" fill="#6F61EF"/>
      <rect x="22" y="56" width="52" height="8" rx="2" fill="#6F61EF"/>
      <rect x="34" y="44" width="52" height="8" rx="2" fill="#6F61EF"/>
      <rect x="46" y="32" width="52" height="8" rx="2" fill="#6F61EF"/>
      <line x1="16" y1="68" x2="52" y2="22" stroke="#39D2C0" stroke-width="3" stroke-linecap="round"/>
      <circle cx="40" cy="26" r="7" fill="#39D2C0"/>
      <line x1="40" y1="33" x2="40" y2="50" stroke="#39D2C0" stroke-width="4" stroke-linecap="round"/>
      <line x1="40" y1="44" x2="30" y2="52" stroke="#39D2C0" stroke-width="3" stroke-linecap="round"/>
      <line x1="40" y1="50" x2="34" y2="64" stroke="#39D2C0" stroke-width="4" stroke-linecap="round"/>
      <line x1="40" y1="50" x2="48" y2="56" stroke="#39D2C0" stroke-width="4" stroke-linecap="round"/>
    </svg>
    <div class="label">Stair Climber</div>
  </div>

</div>
</body>
</html>
